<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0"/>

    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="screen,projection" href="{{ "/assets/materialize.css" | relative_url }}" />
    <link rel="stylesheet" type="text/css" media="screen,projection" href="{{ "/assets/main.css" | relative_url }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}" />

    <link rel="icon" type="image/x-icon" href="{{ "/images/hepix-logo.png" | prepend: site.baseurl }}">

    <style>
        #benchmarking-menu {
            overflow: visible;
        }
        #benchmarking-menu .benchmarking-submenu {
            position: relative;
        }
        #benchmarking-menu .benchmarking-submenu-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 100%;
            min-width: 190px;
            margin: 0;
            padding: 2px 0;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            z-index: 1001;
        }
        #benchmarking-menu .benchmarking-submenu:hover > .benchmarking-submenu-menu,
        #benchmarking-menu .benchmarking-submenu:focus-within > .benchmarking-submenu-menu {
            display: block;
        }
        #benchmarking-menu .benchmarking-submenu-menu li {
            clear: both;
            color: #1e293b;
            cursor: pointer;
            min-height: 0;
            line-height: 1.4;
            width: 100%;
            text-align: left;
            text-transform: none;
        }
        #benchmarking-menu .benchmarking-submenu-menu li > a {
            padding: 6px 16px;
            line-height: 1.2;
            color: #1e293b;
        }
        #benchmarking-menu .benchmarking-submenu-menu li > a:hover {
            background-color: #f1f5f9;
        }
    </style>

    {% if jekyll.environment == 'production' and site.google_analytics %}
    {% include google-analytics.html %}
    {% endif %}


<!--  Scripts-->
<script src="{{ "js/jquery.min.js" | relative_url }}"></script>
<script src="{{ "js/materialize.min.js" | relative_url }}"></script>
<script src="{{ "js/init.js" | relative_url }}"></script>

<!--The lines below help include JQuery DataTables into Markdown files-->
{%- if page.datatable == true -%}
<link rel="stylesheet" href="{{ "/css/jquery.dataTables.css" | relative_url }}" />

<style>
    .datatable-container {
        width: 100%;
        overflow: hidden;
    }
    .dataTables_wrapper {
        width: 100%;
    }
    .dataTables_scrollBody {
        overflow-x: auto !important;
        border-bottom: 1px solid #e2e8f0;
    }
    .dataTables_scrollHeadInner,
    .dataTables_scrollBody {
        width: 100%;
    }
    .dataTables_scrollHeadInner table,
    .dataTables_scrollBody table {
        min-width: 100%;
    }
    table.dataTable {
        table-layout: auto;
    }
    table.dataTable th,
    table.dataTable td {
        white-space: nowrap;
    }
    details.metrics-toggle {
        margin: 12px 0 16px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 8px 12px;
        background: #f8fafc;
    }
    details.metrics-toggle[open] {
        background: #ffffff;
    }
    details.metrics-toggle > * + * {
        margin-top: 10px;
    }
    details.metrics-toggle ul {
        margin: 8px 0 0 20px;
    }
    details.metrics-toggle summary {
        cursor: pointer;
        font-weight: 600;
        color: #0f172a;
        list-style: none;
    }
    details.metrics-toggle summary::-webkit-details-marker {
        display: none;
    }
    details.metrics-toggle summary::before {
        content: "▸";
        display: inline-block;
        margin-right: 8px;
        transition: transform 0.2s ease;
    }
    details.metrics-toggle[open] summary::before {
        transform: rotate(90deg);
    }
    .datatable-scroll-top {
        overflow-x: auto;
        overflow-y: hidden;
        height: 14px;
        margin: 6px 0 8px;
    }
    .datatable-scroll-top__inner {
        height: 1px;
    }
    .datatable-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin: 8px 0;
    }
    .dataTables_length,
    .dataTables_filter {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #334155;
    }
    .dataTables_filter {
        margin-left: auto;
    }
    .dataTables_filter label,
    .dataTables_length label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        white-space: nowrap;
    }
    .dataTables_filter input,
    .dataTables_length select {
        height: 36px;
        padding: 6px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
        font-size: 0.95rem;
        color: #1f2937;
    }
    .datatable-columns {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 12px;
    }
    .datatable-columns__header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
        justify-content: space-between;
    }
    .datatable-columns__meta {
        font-size: 0.85rem;
        color: #64748b;
    }
    .datatable-columns__title {
        font-weight: 600;
        color: #0f172a;
    }
    .datatable-columns__actions {
        display: flex;
        gap: 8px;
    }
    .datatable-btn {
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #334155;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 0.9rem;
    }
    .datatable-btn:hover {
        border-color: #94a3b8;
    }
    .datatable-columns__filter {
        height: 34px;
        padding: 6px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
        font-size: 0.9rem;
        color: #1f2937;
    }
    .datatable-columns__list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
        max-height: 160px;
        overflow: auto;
    }
    .datatable-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        font-size: 0.85rem;
        color: #334155;
        white-space: nowrap;
    }
    .datatable-toggle.is-hidden {
        opacity: 0.45;
        background: #f1f5f9;
        border-color: #cbd5f5;
        text-decoration: line-through;
    }
    .datatable-toggle input {
        accent-color: #0ea5e9;
    }
    table.dataTable thead th {
        white-space: nowrap;
    }
    table.dataTable thead tr.filters th {
        padding: 4px 6px;
    }
    table.dataTable thead tr.filters input {
        box-sizing: border-box;
        width: 100%;
        min-width: 48px;
        height: 30px;
        padding: 4px 6px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 400;
    }
</style>
{% endif %}

</head>
